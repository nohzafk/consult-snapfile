name: Release Binaries

on:
  workflow_run:
    workflows: [Test]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            archive_ext: tar.gz
          - os: macos-14
            name: macos-aarch64
            archive_ext: tar.gz

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          asset="consult-snapfile-server-${{ matrix.name }}.${{ matrix.archive_ext }}"
          tar -C target/release -czf "dist/${asset}" consult-snapfile-server

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: consult-snapfile-server-${{ matrix.name }}
          path: dist/*

  release:
    name: Publish rolling latest release
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Move latest tag to current commit
        env:
          RELEASE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
        run: |
          git tag -f latest "$RELEASE_SHA"
          git push origin refs/tags/latest --force

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest build
          prerelease: true
          generate_release_notes: true
          overwrite_files: true
          files: dist/**/*.tar.gz
