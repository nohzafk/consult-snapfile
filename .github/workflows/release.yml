name: Release Binaries

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            archive_ext: tar.gz
          - os: macos-13
            name: macos-x86_64
            archive_ext: tar.gz
          - os: macos-14
            name: macos-aarch64
            archive_ext: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Package binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          asset="consult-snapfile-server-${{ matrix.name }}.${{ matrix.archive_ext }}"
          tar -C target/release -czf "dist/${asset}" consult-snapfile-server

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: consult-snapfile-server-${{ matrix.name }}
          path: dist/*

  release:
    name: Publish prerelease
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: Build ${{ github.sha }}
          prerelease: true
          generate_release_notes: true
          files: dist/**/*.tar.gz
